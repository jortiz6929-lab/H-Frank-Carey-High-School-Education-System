<!DOCTYPE html>
<html>
<head>
    <title>H Frank Carey Student Resources</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .logo { width: 100px; margin-bottom: 20px; opacity: 0.8; }
        h1 { font-size: 2rem; margin-bottom: 10px; }
        p { color: #8b949e; margin-bottom: 30px; }
        input { background: #161b22; border: 1px solid #30363d; color: white; padding: 15px; width: 400px; border-radius: 25px; text-align: center; outline: none; }
        input:focus { border-color: #58a6ff; }
        .footer { position: fixed; bottom: 20px; font-size: 0.8rem; color: #484f58; display: flex; gap: 20px; }
    </style>
</head>
<body>

    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Placeholder_view_vector.svg/681px-Placeholder_view_vector.svg.png" class="logo" alt="Portal Logo">
    <h1>H Frank Carey Student Resources</h1>
    <p>"Access your school curriculum and digital learning tools here."</p>

    <form id="proxy-form">
        <input type="text" placeholder="Search Educational Resources" id="proxy-input">
    </form>

    <div class="footer">
        <span>TitaniumNetwork</span>
        <span>Discord</span>
        <span>TompHTTP</span>
        <span>GitHub</span>
        <span>Credits</span>
    </div>

    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    <script>
        const form = document.getElementById('proxy-form');
        const input = document.getElementById('proxy-input');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            
            // Register the Service Worker (The "Unblocker")
            window.navigator.serviceWorker.register('./sw.js', {
                scope: __uv$config.prefix
            }).then(() => {
                let url = input.value.trim();
                // If it's not a URL, search it on Google
                if (!url.includes('.') || url.includes(' ')) {
                    url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
                } else if (!url.startsWith('http')) {
                    url = 'https://' + url;
                }
                
                // Launch the site through the proxy
                location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
            });
        });
    </script>
</body>
</html>
